<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="flex h-screen w-full relative overflow-hidden">
      <div class="bg-[#FBC509] px-10 py-8  relative">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/International_Pok%C3%A9mon_logo.svg/1280px-International_Pok%C3%A9mon_logo.svg.png"
          alt="pokemon"
          class="w-2/12 mb-24"
        />
        <div class="text-black flex flex-col justify-center gap-4">
          <p class="tracking-[0.5em] font-semibold">Pokemon Gen I</p>
          <h1 class="text-9xl font-bold tracking-wide">Pikachu</h1>
          <p class="text-black/60 font-medium max-w-[360px]">
            Pikachu is an Electric-type Pokémon introduced in Generation I.
            Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
            They are almost completely covered by yellow fur.
          </p>
          <span class="font-bold text-xl my-6">---- 01/08</span>
        </div>
        <img
          src="./Pokeball.png"
          class="w-60 absolute bottom-[-80px] opacity-30"
        />
      </div>
      <img
        src="./Pickachu.png"
        alt="pikachu"
        class="absolute top-32 left-1/2  w-[38%] object-contain z-10"
      />
      <div class="w-1/2 bg-[#FBE8B4] px-10 py-8 flex flex-col gap-64 items-end">
        <i class="ri-menu-line text-5xl"></i>
      
        <div class="flex flex-col gap-4 items-center ">
          <span class="w-3 h-3 bg-black rounded-full"></span>
          <span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
          <span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
          <span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
        </div>
      </div>
      </div>
    </div>
  </body>
</html>
